<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#05080f"/>
    </radialGradient>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="electronGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </radialGradient>
    <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- === BRAIN OUTLINE (neural network shape) === -->
  <!-- Left hemisphere curve -->
  <path d="M 180 160 C 120 140, 90 180, 95 220 C 100 260, 110 280, 105 310 C 100 340, 115 370, 145 375 C 165 378, 175 360, 190 350 L 256 350 L 256 160 Z"
        fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.3"/>
  <!-- Right hemisphere curve -->
  <path d="M 332 160 C 392 140, 422 180, 417 220 C 412 260, 402 280, 407 310 C 412 340, 397 370, 367 375 C 347 378, 337 360, 322 350 L 256 350 L 256 160 Z"
        fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.3"/>
  <!-- Brain top -->
  <path d="M 180 160 C 195 130, 225 120, 256 118 C 287 120, 317 130, 332 160"
        fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.3"/>
  <!-- Corpus callosum (center divider) -->
  <line x1="256" y1="145" x2="256" y2="355" stroke="#7c3aed" stroke-width="1.5" opacity="0.25" stroke-dasharray="6,4"/>

  <!-- === NEURAL CONNECTIONS (synapses) === -->
  <!-- Left hemisphere connections -->
  <line x1="145" y1="200" x2="200" y2="240" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="145" y1="200" x2="175" y2="175" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="175" y1="175" x2="225" y2="185" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="200" y1="240" x2="165" y2="270" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="165" y1="270" x2="195" y2="305" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="195" y1="305" x2="230" y2="285" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="230" y1="285" x2="200" y2="240" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="225" y1="185" x2="230" y2="285" stroke="#6d28d9" stroke-width="1.2" opacity="0.4"/>
  <line x1="225" y1="185" x2="200" y2="240" stroke="#6d28d9" stroke-width="1.2" opacity="0.4"/>
  <line x1="175" y1="330" x2="195" y2="305" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="175" y1="330" x2="165" y2="270" stroke="#6d28d9" stroke-width="1.2" opacity="0.4"/>

  <!-- Right hemisphere connections -->
  <line x1="367" y1="200" x2="312" y2="240" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="367" y1="200" x2="337" y2="175" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="337" y1="175" x2="287" y2="185" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="312" y1="240" x2="347" y2="270" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="347" y1="270" x2="317" y2="305" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="317" y1="305" x2="282" y2="285" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="282" y1="285" x2="312" y2="240" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="287" y1="185" x2="282" y2="285" stroke="#6d28d9" stroke-width="1.2" opacity="0.4"/>
  <line x1="337" y1="330" x2="317" y2="305" stroke="#6d28d9" stroke-width="1.2" opacity="0.5"/>
  <line x1="337" y1="330" x2="347" y2="270" stroke="#6d28d9" stroke-width="1.2" opacity="0.4"/>

  <!-- Cross-hemisphere connections through center -->
  <line x1="230" y1="285" x2="282" y2="285" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <line x1="225" y1="185" x2="287" y2="185" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>

  <!-- === ELECTRON ORBITS around key nodes === -->
  <!-- Orbit around center node (256, 256) -->
  <ellipse cx="256" cy="256" rx="38" ry="15" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.7" transform="rotate(-30 256 256)"/>
  <ellipse cx="256" cy="256" rx="38" ry="15" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.7" transform="rotate(30 256 256)"/>
  <ellipse cx="256" cy="256" rx="38" ry="15" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.7" transform="rotate(90 256 256)"/>

  <!-- Orbit around left node (200, 240) -->
  <ellipse cx="200" cy="240" rx="22" ry="9" fill="none" stroke="#818cf8" stroke-width="1.2" opacity="0.6" transform="rotate(45 200 240)"/>
  <ellipse cx="200" cy="240" rx="22" ry="9" fill="none" stroke="#818cf8" stroke-width="1.2" opacity="0.6" transform="rotate(-45 200 240)"/>

  <!-- Orbit around right node (312, 240) -->
  <ellipse cx="312" cy="240" rx="22" ry="9" fill="none" stroke="#818cf8" stroke-width="1.2" opacity="0.6" transform="rotate(-45 312 240)"/>
  <ellipse cx="312" cy="240" rx="22" ry="9" fill="none" stroke="#818cf8" stroke-width="1.2" opacity="0.6" transform="rotate(45 312 240)"/>

  <!-- === NEURAL NODES (atom nuclei) === -->
  <!-- Main center node -->
  <circle cx="256" cy="256" r="14" fill="url(#coreGrad)" filter="url(#softGlow)"/>
  <circle cx="256" cy="256" r="8" fill="#c4b5fd"/>

  <!-- Left hemisphere nodes -->
  <circle cx="145" cy="200" r="8" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="175" cy="175" r="6" fill="url(#electronGrad)" filter="url(#glow)"/>
  <circle cx="200" cy="240" r="9" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="225" cy="185" r="7" fill="url(#electronGrad)" filter="url(#glow)"/>
  <circle cx="165" cy="270" r="7" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="195" cy="305" r="8" fill="url(#electronGrad)" filter="url(#glow)"/>
  <circle cx="230" cy="285" r="7" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="175" cy="330" r="6" fill="url(#electronGrad)" filter="url(#glow)"/>

  <!-- Right hemisphere nodes -->
  <circle cx="367" cy="200" r="8" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="337" cy="175" r="6" fill="url(#electronGrad)" filter="url(#glow)"/>
  <circle cx="312" cy="240" r="9" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="287" cy="185" r="7" fill="url(#electronGrad)" filter="url(#glow)"/>
  <circle cx="347" cy="270" r="7" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="317" cy="305" r="8" fill="url(#electronGrad)" filter="url(#glow)"/>
  <circle cx="282" cy="285" r="7" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="337" cy="330" r="6" fill="url(#electronGrad)" filter="url(#glow)"/>

  <!-- === ELECTRONS (small fast particles on orbits) === -->
  <!-- On center orbit 1 -->
  <circle cx="294" cy="245" r="4" fill="#e9d5ff" filter="url(#glow)"/>
  <!-- On center orbit 2 -->
  <circle cx="222" cy="271" r="4" fill="#e9d5ff" filter="url(#glow)"/>
  <!-- On center orbit 3 -->
  <circle cx="256" cy="218" r="3.5" fill="#c4b5fd" filter="url(#glow)"/>

  <!-- On left small orbit -->
  <circle cx="219" cy="228" r="3" fill="#bfdbfe" filter="url(#glow)"/>
  <!-- On right small orbit -->
  <circle cx="293" cy="228" r="3" fill="#bfdbfe" filter="url(#glow)"/>

  <!-- === AMBIENT GLOW === -->
  <circle cx="256" cy="240" r="80" fill="#7c3aed" opacity="0.04"/>
  <circle cx="180" cy="220" r="40" fill="#3b82f6" opacity="0.05"/>
  <circle cx="332" cy="220" r="40" fill="#3b82f6" opacity="0.05"/>
</svg>
